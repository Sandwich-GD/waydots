conky.config = {
  alignment = 'top_left',
  out_to_x = true,
  out_to_wayland = true,
  background = true,
  border_width = 1,
  use_xft = true,
  font = 'JetBrainsMono Nerd Font:size=10',
  uppercase = false,
  use_spacer = 'none',
  own_window = true,
  own_window_class = 'Conky',
  own_window_type = 'normal',
  own_window_transparent = true,
  own_window_argb_visual = false,
  own_window_colour = '#191919',
  own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
  own_window_corners = rounded,
  cpu_avg_samples = 2,
  net_avg_samples = 2,
  default_color = 'white',
  default_outline_color = 'white',
  default_shade_color = '000000',
  double_buffer = true,
  no_buffers = true,
  draw_borders = false,
  draw_graph_borders = true,
  draw_outline = false,
  draw_shades = false,
  extra_newline = false,
  gap_x = 10,
  gap_y = 0,
  minimum_height = 780,
  minimum_width = 560,
  out_to_console = false,
  out_to_ncurses = false,
  out_to_stderr = false,
  temperature_unit = 'celsius',
  update_interval = 1.0,
  color1 = '#800080',
  color2 = '#8a2be2',
  color3 = '#9370db',
  color4 = '#dda0dd',
  color5 = '#682860',
  color6 = '#483d8b',
  color7 = '#9400d3',
  color8 = '#967bb6',
  color9 = '#4b0082'
}

conky.text = [[
# System
${goto 5}${font JetBrainsMono Nerd Font:bold:size=10}${voffset -2}${color2}SYSTEM ${color3}${hr 2}${font}

${goto 5}${color9}Host: ${color2}${alignr}${nodename}
${goto 5}${color9}System: ${color2}${alignr}${machine}
${goto 5}${color9}Uptime: ${color2}${alignr}${uptime}
${goto 5}${color9}Kernel: ${color2}${alignr}${execi 65000 uname -r}
${goto 5}${color9}Distro: ${color2}${alignr}${execi 65000 lsb_release -d | cut -c 14-}
# CPU

${goto 5}${font JetBrainsMono Nerd Font:bold:size=10}${voffset -2}${color2}CPU ${color3}${hr 2}${font}

${goto 5}${voffset 5}${font JetBrainsMono Nerd Font:size=12}${color7}CPU: ${cpu cpu0}% ${cpubar cpu0}
${goto 5}${voffset 8}${font JetBrainsMono Nerd Font:size=10}${color3}CPU 1: ${color9}${cpubar cpu1 6,60} ${color9}${cpu cpu1}% ${goto 900}${color3}CPU 2: ${color9}${cpubar cpu2 6,60} ${color9}${cpu cpu2}%
${goto 5}${voffset 2}${color3}CPU 3: ${color9}${cpubar cpu3 6,60} ${color9}${cpu cpu3}% ${goto 900}${color3}CPU 4: ${color9}${cpubar cpu4 6,60} ${color9}${cpu cpu4}%
# Memory

${goto 5}${font JetBrainsMono Nerd Font:bold:size=10}${voffset -2}${color2}RAM ${color3}${hr 2}${font}

${font JetBrainsMono Nerd Font:normal:size=10}RAM $alignc $mem / $memmax $alignr $memperc%
$membar
SWAP $alignc ${swap} / ${swapmax} $alignr ${swapperc}%
${swapbar}

${font JetBrainsMono Nerd Font:normal:size=10}${color}Disk: ${color3}${fs_used /} ${color2}/${color3} ${fs_size /} ${alignc}${color7}(${fs_free /})
${fs_bar}

# Network
${goto 5}${font JetBrainsMono Nerd Font:bold:size=10}${voffset -2}${color2}NETWORK ${color3}${hr 2}${font}

${goto 5}${color2}Localhost: ${color FFFF00}${alignr}${addr enp2s0}


${goto 5}${voffset 5}${color}Input: ${color3}${downspeed enp2s0} k/s ${alignr}${color}Output: ${color2}${upspeed enp2s0} k/s
${goto 5}${downspeedgraph enp2s0 10,135} ${alignr}${upspeedgraph enp2s0 10,135}

# Quote workaround
${goto 5}${color1}${font JetBrainsMono Nerd Font:bold:size=50}"All Roads Lead To Math."${font}

]]
